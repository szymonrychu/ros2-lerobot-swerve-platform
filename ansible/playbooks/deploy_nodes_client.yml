---
# Deploy ROS2 nodes on Client: clone repo on the Pi, build containers there, systemd + config.
# Node list and config from group_vars/client.yml; repo from group_vars/all.yml.
# Run from ansible/: ansible-playbook -i inventory playbooks/deploy_nodes_client.yml -l client

- name: Deploy Client ROS2 nodes
  hosts: client
  become: true
  pre_tasks:
    - name: Ensure UART enabled for GPS RTK (enable_uart=1)
      when: ros2_nodes | selectattr('node_type', 'equalto', 'gps_rtk') | list | length > 0
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "enable_uart=1"
        regexp: "^enable_uart="
        create: true
      become: true

    - name: Enable UART0 overlay for RPi 5 (GPIO 14/15 for LC29H hat)
      when:
        - ros2_nodes | selectattr('node_type', 'equalto', 'gps_rtk') | list | length > 0
        - ansible_machine == "aarch64"
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "dtoverlay=uart0-pi5"
        regexp: "^dtoverlay=uart0-pi5"
        insertafter: "^enable_uart="
        create: true
      become: true
      register: uart_overlay_result

    - name: Reboot client if UART overlay was added (required for Pi 5)
      when: uart_overlay_result is defined and uart_overlay_result.changed
      ansible.builtin.reboot:
        reboot_timeout: 120
      become: true

    - name: Stop feetech (servo) node services before deploy
      ansible.builtin.service:
        name: "ros2-{{ item.name }}"
        state: stopped
      loop: "{{ ros2_nodes | selectattr('node_type', 'equalto', 'feetech_servos') | list }}"
      loop_control:
        label: "{{ item.name }}"
      ignore_errors: true
      become: true

    - name: Ensure repo directory exists
      ansible.builtin.file:
        path: "{{ ros2_repo_dest }}"
        state: directory
        mode: "0755"
      become: true
      tags: always

    - name: Clone or update repo for local builds
      ansible.builtin.git:
        repo: "{{ ros2_repo_url }}"
        dest: "{{ ros2_repo_dest }}"
        version: "{{ ros2_repo_revision }}"
        force: true
        update: true
      become: true
      tags: always

  tasks:
    - name: Deploy each ROS2 node
      ansible.builtin.include_role:
        name: ros2_node_deploy
        apply:
          tags:
            - "{{ item.name }}"
            - deploy
      tags:
        - "{{ item.name }}"
        - deploy
      vars:
        _master2master_server_env: "{{ ['ROS2_SERVER_HOST=' + ros2_server_host] if (item.node_type == 'master2master' and ros2_server_host is defined and ros2_server_host | length > 0) else [] }}"
        node_name: "{{ item.name }}"
        node_type: "{{ item.node_type }}"
        node_present: "{{ item.present | default(true) }}"
        node_enabled: "{{ item.enabled | default(true) }}"
        node_config: "{{ item.config | default('') }}"
        node_image: "{{ ros2_node_type_defaults[item.node_type].image }}"
        node_build_context: "{{ ros2_node_type_defaults[item.node_type].build_context }}"
        repo_dest: "{{ ros2_repo_dest }}"
        node_config_path: "{{ ros2_node_type_defaults[item.node_type].config_path | default(omit) }}"
        node_env: "{{ (ros2_node_type_defaults[item.node_type].env | default([])) + (item.env | default([])) + _master2master_server_env }}"
        node_extra_args: "{{ item.extra_args | default('') }}"
      loop: "{{ ros2_nodes }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Verify all ROS2 node services are active and stable
      ansible.builtin.include_role:
        name: ros2_node_verify
