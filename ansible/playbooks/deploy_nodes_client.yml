---
# Deploy all ROS2 nodes on Client RPi5.
# Node list and config live in group_vars/client.yml; repo vars in group_vars/all.yml.
# For a single node use: scripts/deploy-nodes.sh client <node-name>

- name: Deploy all Client ROS2 nodes
  hosts: client
  become: true
  pre_tasks:
    - name: Ensure UART enabled for GPS RTK (enable_uart=1)
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "enable_uart=1"
        regexp: "^enable_uart="
        create: true

    - name: Enable UART0 overlay for RPi 5 (GPIO 14/15 for LC29H hat)
      when: ansible_machine == "aarch64"
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "dtoverlay=uart0-pi5"
        regexp: "^dtoverlay=uart0-pi5"
        insertafter: "^enable_uart="
        create: true
      register: uart_overlay_result

    - name: Reboot client if UART overlay was added (required for Pi 5)
      when: uart_overlay_result is defined and uart_overlay_result.changed
      ansible.builtin.reboot:
        reboot_timeout: 120

    - name: Stop lerobot_follower service before deploy (safety)
      ansible.builtin.service:
        name: ros2-lerobot_follower
        state: stopped
      ignore_errors: true

    - name: Stop swerve_drive_servos service before deploy (safety)
      ansible.builtin.service:
        name: ros2-swerve_drive_servos
        state: stopped
      ignore_errors: true

    - name: Sync repository
      ansible.builtin.include_tasks: tasks/repo_sync.yml

  tasks:
    - name: Deploy ros2-master
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: ros2-master

    - name: Deploy master2master
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: master2master
        _extra_env: "{{ ['ROS2_SERVER_HOST=' + ros2_server_host] if (ros2_server_host is defined and ros2_server_host | length > 0) else [] }}"

    - name: Deploy filter_node
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: filter_node

    - name: Deploy test_joint_api
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: test_joint_api

    - name: Deploy topic_scraper_api
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: topic_scraper_api

    - name: Deploy bno055_imu
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: bno055_imu

    - name: Deploy gps_rtk_rover
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: gps_rtk_rover

    - name: Deploy haptic_controller
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: haptic_controller

    - name: Deploy gripper_uvc_camera
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: gripper_uvc_camera

    - name: Deploy rplidar_a1
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: rplidar_a1

    - name: Deploy realsense_d435i
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: realsense_d435i

    - name: Deploy lerobot_follower
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: lerobot_follower

    - name: Deploy swerve_drive_servos
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: swerve_drive_servos

    - name: Deploy swerve_controller
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: swerve_controller

    - name: Deploy static_tf_publisher
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: static_tf_publisher

    - name: Deploy robot_localization_ekf
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: robot_localization_ekf

    - name: Deploy nav2_bringup
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: nav2_bringup

    - name: Deploy web_ui
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: web_ui

    - name: Verify all ROS2 node services are active and stable
      ansible.builtin.include_role:
        name: ros2_node_verify
