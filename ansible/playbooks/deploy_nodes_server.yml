---
# Deploy all ROS2 nodes on Server RPi4b.
# Node list and config live in group_vars/server.yml; repo vars in group_vars/all.yml.
# For a single node use: scripts/deploy-nodes.sh server <node-name>

- name: Deploy all Server ROS2 nodes
  hosts: server
  become: true
  pre_tasks:
    - name: Ensure UART enabled for GPS RTK base station (enable_uart=1)
      when: ros2_nodes | selectattr('node_type', 'equalto', 'gps_rtk') | list | length > 0
      ansible.builtin.lineinfile:
        path: /boot/firmware/config.txt
        line: "enable_uart=1"
        regexp: "^enable_uart="
        create: true

    - name: Stop lerobot_leader service before deploy (safety)
      ansible.builtin.service:
        name: ros2-lerobot_leader
        state: stopped
      ignore_errors: true

    - name: Sync repository
      ansible.builtin.include_tasks: tasks/repo_sync.yml

  tasks:
    - name: Deploy ros2-master
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: ros2-master

    - name: Deploy lerobot_leader
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: lerobot_leader

    - name: Deploy topic_scraper_api
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: topic_scraper_api

    - name: Deploy gps_rtk_base
      ansible.builtin.include_tasks: tasks/resolve_and_deploy.yml
      vars:
        _deploy_node_name: gps_rtk_base

    - name: Verify all ROS2 node services are active and stable
      ansible.builtin.include_role:
        name: ros2_node_verify
