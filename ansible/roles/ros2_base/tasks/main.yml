---
# Bootstrap ROS2 Jazzy on a fresh Ubuntu 24.04 host.
# Installs: apt prerequisites, ROS2 Jazzy, Python tooling, Poetry,
# hardware support libs, Node.js 22 (client only), user groups.

- name: Pin runtime libs to noble/main versions (ARM64 security updates break ROS2 dev deps)
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/ros2-compat
    content: |
      Package: zlib1g
      Pin: version 1:1.3.dfsg-3.1ubuntu2
      Pin-Priority: 1001

      Package: liblz4-1
      Pin: version 1.9.4-1build1
      Pin-Priority: 1001

      Package: libzstd1
      Pin: version 1.5.5+dfsg2-2build1
      Pin-Priority: 1001

      Package: libbz2-1.0
      Pin: version 1.0.8-5.1
      Pin-Priority: 1001

      Package: libsqlite3-0
      Pin: version 3.45.1-1ubuntu2
      Pin-Priority: 1001

      Package: libuuid1
      Pin: version 2.39.3-9ubuntu6
      Pin-Priority: 1001
    mode: "0644"
  become: true

- name: Downgrade pinned libs to noble/main versions if security-updated
  ansible.builtin.apt:
    name:
      - zlib1g=1:1.3.dfsg-3.1ubuntu2
      - liblz4-1=1.9.4-1build1
      - libzstd1=1.5.5+dfsg2-2build1
      - libbz2-1.0=1.0.8-5.1
      - libsqlite3-0=3.45.1-1ubuntu2
      - libuuid1=2.39.3-9ubuntu6
    state: present
    update_cache: true
    allow_downgrade: true
  become: true

- name: Update apt cache and upgrade packages
  ansible.builtin.apt:
    update_cache: true
    upgrade: dist
    cache_valid_time: 0
  become: true

- name: Install apt prerequisites
  ansible.builtin.apt:
    name:
      - curl
      - gnupg2
      - lsb-release
      - software-properties-common
      - ca-certificates
      - apt-transport-https
    state: present
  become: true

- name: Add ROS2 GPG key
  ansible.builtin.apt_key:
    url: https://raw.githubusercontent.com/ros/rosdistro/master/ros.key
    keyring: /usr/share/keyrings/ros-archive-keyring.gpg
    state: present
  become: true

- name: Add ROS2 Jazzy apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/usr/share/keyrings/ros-archive-keyring.gpg]
      http://packages.ros.org/ros2/ubuntu {{ ansible_distribution_release }} main
    state: present
    filename: ros2
  become: true

- name: Install ROS2 Jazzy base and message packages
  ansible.builtin.apt:
    name:
      - ros-jazzy-ros-base
      - ros-jazzy-ros2cli
      - ros-jazzy-rclpy
      - ros-jazzy-sensor-msgs
      - ros-jazzy-geometry-msgs
      - ros-jazzy-nav-msgs
      - ros-jazzy-std-msgs
      - ros-jazzy-tf2-ros
      - ros-jazzy-tf2-geometry-msgs
      - ros-jazzy-rosidl-runtime-py
      - ros-jazzy-launch-ros
      - python3-rosdep
    state: present
    update_cache: true
  become: true

- name: Remove ros2-compat apt pin (ROS2 packages installed, pins no longer needed)
  ansible.builtin.file:
    path: /etc/apt/preferences.d/ros2-compat
    state: absent
  become: true

- name: Install Python tooling
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - pipx
    state: present
  become: true

- name: Install numpy via pip (apt version blocked by gcc-14-base version conflict on ARM64)
  ansible.builtin.pip:
    name: numpy
    state: present
    extra_args: --break-system-packages
  become: true

- name: Install Poetry via pipx (system-wide)
  ansible.builtin.command: pipx install poetry
  become: true
  environment:
    PIPX_HOME: /opt/pipx
    PIPX_BIN_DIR: /usr/local/bin
  register: _poetry_install
  changed_when: "'already installed' not in _poetry_install.stdout"
  failed_when: _poetry_install.rc != 0 and 'already installed' not in _poetry_install.stderr

- name: Install hardware support libraries
  ansible.builtin.apt:
    name:
      - i2c-tools
      - libi2c-dev
      - python3-smbus
      - libgl1
      - libglib2.0-0
      - libv4l-dev
      - setserial
    state: present
  become: true

- name: Add NodeSource GPG key (client only)
  when: "'client' in group_names"
  ansible.builtin.apt_key:
    url: https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key
    keyring: /usr/share/keyrings/nodesource.gpg
    state: present
  become: true

- name: Add NodeSource Node.js 22 repository (client only)
  when: "'client' in group_names"
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/nodesource.gpg]
      https://deb.nodesource.com/node_22.x nodistro main
    state: present
    filename: nodesource
  become: true

- name: Install Node.js 22 (client only)
  when: "'client' in group_names"
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  become: true

- name: Create /opt/ros2-nodes base directory
  ansible.builtin.file:
    path: /opt/ros2-nodes
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Add ansible_user to device access groups
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: "{{ item }}"
    append: true
  become: true
  loop:
    - dialout
    - i2c
    - video
    - plugdev
    - gpio
  failed_when: false
