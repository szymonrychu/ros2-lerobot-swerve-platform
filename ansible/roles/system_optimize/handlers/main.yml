---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart journald
  ansible.builtin.service:
    name: systemd-journald
    state: restarted

- name: Restart docker
  ansible.builtin.service:
    name: docker
    state: restarted

- name: Apply sysctl
  ansible.builtin.command: sysctl --system
  changed_when: true
