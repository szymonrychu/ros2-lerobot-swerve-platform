---
# ── Debloat ──────────────────────────────────────────────────────────────────
# Packages to purge (not needed on headless RPi running Docker + ROS2)
debloat_packages_purge:
  - snapd
  - cloud-init
  - cloud-guest-utils
  - modemmanager
  - open-vm-tools
  - vgauth
  - open-iscsi
  - multipath-tools
  - udisks2
  - apport
  - pollinate
  - unattended-upgrades
  - update-notifier-common
  - secureboot-db
  - popularity-contest
  - landscape-common
  - ubuntu-advantage-tools
  - ubuntu-pro-client

# Services to stop and mask (disable permanently even if package stays)
debloat_services_mask:
  - avahi-daemon.service
  - avahi-daemon.socket
  - ModemManager.service
  - multipathd.service
  - multipathd.socket
  - iscsid.service
  - iscsid.socket
  - open-iscsi.service
  - open-vm-tools.service
  - vgauth.service
  - udisks2.service
  - apport.service
  - pollinate.service
  - secureboot-db.service

# Keep wpa_supplicant running only if WiFi is configured
debloat_disable_wpa_supplicant: true

# ── Performance ──────────────────────────────────────────────────────────────
# CPU governor: "performance" for lowest latency; "ondemand" for power saving
cpu_governor: performance

# Virtual memory tuning
sysctl_vm_swappiness: 10
sysctl_vm_vfs_cache_pressure: 50
sysctl_vm_dirty_ratio: 10
sysctl_vm_dirty_background_ratio: 5
sysctl_vm_min_free_kbytes: 65536

# Network buffers for ROS2 DDS (UDP) performance
sysctl_net_core_rmem_max: 8388608
sysctl_net_core_wmem_max: 8388608
sysctl_net_core_rmem_default: 1048576
sysctl_net_core_wmem_default: 1048576

# ── Resilience ───────────────────────────────────────────────────────────────
# Swap file (MiB); set 0 to skip
swap_size_mb: 1024
swap_path: /swapfile

# Hardware watchdog (auto-reboot on hang)
watchdog_enabled: true
watchdog_timeout_s: 15

# Journal size cap (prevent log bloat on SD card)
journal_max_use: 100M
journal_max_file_size: 25M

# tmpfs for /tmp to reduce SD card writes
tmpfs_tmp_enabled: true
tmpfs_tmp_size: 256M

# Kernel panic auto-reboot delay (seconds)
kernel_panic_reboot_s: 10

# Docker log rotation (applied via daemon.json merge)
docker_log_max_size: 10m
docker_log_max_file: "3"
