[defaults]
inventory = inventory
roles_path = roles
# Use built-in default callback; 'yaml' requires community.general collection
stdout_callback = default
deprecation_warnings = False

[ssh_connection]
ssh_args = -o ControlMaster=no -o ControlPath=none -o ConnectTimeout=30 -o ServerAliveInterval=10 -o ServerAliveCountMax=6
timeout = 120
retries = 5
