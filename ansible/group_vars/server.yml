---
# Server — Raspberry Pi 4b: Lerobot SO-101 leader, GPS-RTK LC29H(BS)
# Network (netplan) and hostname — set for each host or here for the group:
network_address: "192.168.1.33/24"
network_gateway: "192.168.1.1"
primary_dns_server: "192.168.1.1"
secondary_dns_server: "1.1.1.1"
network_nameservers:
  - "{{ primary_dns_server }}"
  - "{{ secondary_dns_server }}"
hostname: "server-rpi4"

# ROS2 node types: default settings per type (used by ros2_node_deploy).
# Server ROS2 master binds to all interfaces (0.0.0.0) so Client can connect; other nodes use localhost only.
ros2_node_type_defaults:
  ros2_master:
    deploy_mode: native
    node_launch_command: "ros2 daemon start && sleep infinity"
    node_src_dir: ""
    cpu_quota: "20%"
    memory_max: "128M"
    env:
      - ROS_LOCALHOST_ONLY=0
  feetech_servos:
    deploy_mode: native
    node_launch_command: "python3 -m feetech_servos_node"
    node_src_dir: "nodes/bridges/feetech_servos"
    cpu_quota: "50%"
    memory_max: "128M"
    config_path: /etc/ros2/feetech_servos
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - ROS_STATIC_PEERS={{ ros2_client_hostname }}
      - FEETECH_SERVOS_CONFIG=/etc/ros2/feetech_servos/config.yaml
  topic_scraper_api:
    deploy_mode: native
    node_launch_command: "python3 -m topic_scraper_api"
    node_src_dir: "nodes/topic_scraper_api"
    cpu_quota: "25%"
    memory_max: "128M"
    config_path: /etc/ros2/topic_scraper_api
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - TOPIC_SCRAPER_API_CONFIG=/etc/ros2/topic_scraper_api/config.yaml
  gps_rtk:
    deploy_mode: native
    node_launch_command: "python3 -m gps_rtk_node"
    node_src_dir: "nodes/bridges/gps_rtk"
    cpu_quota: "25%"
    memory_max: "64M"
    config_path: /etc/ros2/gps_rtk
    env:
      - ROS_LOCALHOST_ONLY=0
      - GPS_RTK_CONFIG=/etc/ros2/gps_rtk/config.yaml

# Nodes to deploy: name, node_type, present, enabled, config.
ros2_nodes:
  - name: ros2-master
    node_type: ros2_master
    present: true
    enabled: true
  - name: lerobot_leader
    node_type: feetech_servos
    present: true
    enabled: true
    config: |
      device: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5A7A059057-if00
      namespace: leader
      log_joint_updates: true
      enable_torque_on_start: false
      disable_torque_on_start: true
      interpolation_enabled: false
      publish_only_on_change: true
      publish_change_epsilon: 0.01
      control_loop_hz: 180
      joint_names:
        - name: shoulder_pan
          id: 1
        - name: shoulder_lift
          id: 2
        - name: elbow_flex
          id: 3
        - name: wrist_flex
          id: 4
        - name: wrist_roll
          id: 5
        - name: gripper
          id: 6
  - name: topic_scraper_api
    node_type: topic_scraper_api
    present: true
    enabled: true
    config: |
      host: "0.0.0.0"
      port: 18100
      topic_refresh_interval_s: 0.25
      allowed_types:
        - sensor_msgs/msg/JointState
        - sensor_msgs/msg/NavSatFix
        - sensor_msgs/msg/Image
        - sensor_msgs/msg/CompressedImage
        - std_msgs/msg/String
  - name: gps_rtk_base
    node_type: gps_rtk
    present: true
    enabled: true
    config: |
      mode: base
      serial_port: /dev/ttyAMA0
      baud_rate: 115200
      topic: /server/gps/fix
      frame_id: gps_link
      configure_on_start: true
      rtcm_tcp_port: 5016
      ntrip_mountpoint: /rtk
      ntrip_user: ""
      ntrip_password: ""
