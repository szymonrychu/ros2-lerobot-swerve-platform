---
# Client — Raspberry Pi 5: follower, swerve, sensors, master2master
# Network (netplan) and hostname — set for each host or here for the group:
network_address: "192.168.1.34/24"
network_gateway: "192.168.1.1"
network_nameservers: ["1.1.1.1"]
hostname: "client-rpi5"

# Server IP/hostname for master2master to connect to Server's ROS2 master (set or use inventory).
ros2_server_host: "192.168.1.33"   # or server hostname if DNS/resolution works

# ROS2 node types. Most client nodes stay localhost-only; master2master must reach server ROS graph.
ros2_node_type_defaults:
  ros2_master:
    image: harbor.szymonrichert.pl/containers/client-ros2-master:latest
    build_context: nodes/ros2_master
    env:
      - ROS_LOCALHOST_ONLY=1
  master2master:
    image: harbor.szymonrichert.pl/containers/client-master2master:latest
    build_context: nodes/master2master
    config_path: /etc/ros2/master2master
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - ROS_STATIC_PEERS=192.168.1.33
      - MASTER2MASTER_CONFIG=/etc/ros2/master2master/config.yaml
      # ROS2_SERVER_HOST passed per-node below so master2master can connect to Server's ROS2 master
  feetech_servos:
    image: harbor.szymonrichert.pl/containers/client-feetech-servos-follower:latest
    build_context: nodes/bridges/feetech_servos
    config_path: /etc/ros2/feetech_servos
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - FEETECH_SERVOS_CONFIG=/etc/ros2/feetech_servos/config.yaml
  uvc_camera:
    image: harbor.szymonrichert.pl/containers/client-uvc-camera:latest
    build_context: nodes/bridges/uvc_camera
    env:
      - ROS_LOCALHOST_ONLY=1
  filter_node:
    image: harbor.szymonrichert.pl/containers/client-filter-node:latest
    build_context: nodes/filter_node
    config_path: /etc/ros2/filter_node
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - FILTER_NODE_CONFIG=/etc/ros2/filter_node/config.yaml
  test_joint_api:
    image: harbor.szymonrichert.pl/containers/client-test-joint-api:latest
    build_context: nodes/test_joint_api
    config_path: /etc/ros2/test_joint_api
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - TEST_JOINT_API_CONFIG=/etc/ros2/test_joint_api/config.yaml
  topic_scraper_api:
    image: harbor.szymonrichert.pl/containers/client-topic-scraper-api:latest
    build_context: nodes/topic_scraper_api
    config_path: /etc/ros2/topic_scraper_api
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - TOPIC_SCRAPER_API_CONFIG=/etc/ros2/topic_scraper_api/config.yaml
  bno095_imu:
    image: harbor.szymonrichert.pl/containers/client-bno095-imu:latest
    build_context: nodes/bno095_imu
    config_path: /etc/ros2/bno095_imu
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - BLINKA_FORCECHIP=BCM2XXX
      - BNO095_IMU_CONFIG=/etc/ros2/bno095_imu/config.yaml
  haptic_controller:
    image: harbor.szymonrichert.pl/containers/client-haptic-controller:latest
    build_context: nodes/haptic_controller
    config_path: /etc/ros2/haptic_controller
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
      - HAPTIC_CONTROLLER_CONFIG=/etc/ros2/haptic_controller/config.yaml
  gps_rtk:
    image: harbor.szymonrichert.pl/containers/client-gps-rtk:latest
    build_context: nodes/bridges/gps_rtk
    config_path: /etc/ros2/gps_rtk
    env:
      - ROS_LOCALHOST_ONLY=0
      - GPS_RTK_CONFIG=/etc/ros2/gps_rtk/config.yaml
  rplidar_a1:
    image: harbor.szymonrichert.pl/containers/client-rplidar-a1:latest
    build_context: nodes/bridges/rplidar_a1
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET
  realsense_d435i:
    image: harbor.szymonrichert.pl/containers/client-realsense-d435i:latest
    build_context: nodes/bridges/realsense_d435i
    env:
      - ROS_LOCALHOST_ONLY=0
      - ROS_AUTOMATIC_DISCOVERY_RANGE=SUBNET

# Nodes to deploy: name (logical/service name), node_type (maps to image/config), present, enabled, config.
ros2_nodes:
  - name: ros2-master
    node_type: ros2_master
    present: true
    enabled: true
    extra_args: --network host --ipc host
  - name: master2master
    node_type: master2master
    present: true
    enabled: true
    extra_args: --network host --ipc host
    config: |
      topics:
        - source: /server/cmd_vel
          dest: /client/cmd_vel
          direction: in
        - source: /client/odom
          dest: /server/odom
          direction: out
        - source: /leader/joint_states
          dest: /filter/input_joint_updates
          direction: in
          type: JointState
        - source: /client/haptic_leader_commands
          dest: /leader/joint_commands
          direction: out
          type: JointState
        - source: /client/haptic_leader_set_register
          dest: /leader/set_register
          direction: out
          type: String
  - name: filter_node
    node_type: filter_node
    present: true
    enabled: true
    extra_args: --network host --ipc host
    config: |
      input_topic: /filter/input_joint_updates
      output_topic: /follower/joint_commands
      algorithm: kalman
      control_loop_hz: 100
      joint_names:
        - joint_1
        - joint_2
        - joint_3
        - joint_4
        - joint_5
        - joint_6
      algorithm_params:
        process_noise_pos: 0.00022
        process_noise_vel: 0.014
        measurement_noise: 3e-5
        prediction_lead_s: 0.045
        velocity_decay_per_s: 4.5
        max_prediction_time_s: 0.14
  - name: test_joint_api
    node_type: test_joint_api
    present: true
    enabled: true
    extra_args: --network host --ipc host
    config: |
      host: "0.0.0.0"
      port: 18080
      topic: /filter/input_joint_updates
  - name: topic_scraper_api
    node_type: topic_scraper_api
    present: true
    enabled: true
    extra_args: --network host --ipc host
    config: |
      host: "0.0.0.0"
      port: 18100
      topic_refresh_interval_s: 0.25
      allowed_types:
        - sensor_msgs/msg/JointState
        - sensor_msgs/msg/NavSatFix
        - sensor_msgs/msg/Image
        - sensor_msgs/msg/CompressedImage
        - sensor_msgs/msg/LaserScan
        - sensor_msgs/msg/PointCloud2
        - std_msgs/msg/String
      observation_rules:
        - name: leader_vs_follower
          topics:
            - /filter/input_joint_updates
            - /follower/joint_states
          type: compare
          joint_names:
            - joint_5
            - joint_6
        - name: leader_follower_oscillation
          topics:
            - /filter/input_joint_updates
            - /follower/joint_states
          type: oscillation
          joint_names:
            - joint_5
            - joint_6
          window_s: 1.0
          variance_threshold: 1e-5
          sign_change_min_hz: 2.0
  - name: bno095_imu
    node_type: bno095_imu
    present: true
    enabled: true
    extra_args: >-
      --network host
      --ipc host
      --device=/dev/i2c-1:/dev/i2c-1
    config: |
      topic: /imu/data
      frame_id: imu_link
      publish_hz: 100
      i2c_bus: 1
      i2c_address: 0x28
      orientation_covariance: 0.01
      angular_velocity_covariance: 0.01
      linear_acceleration_covariance: 0.04
  # RPi 5: GPIO UART0 (pins 14/15) needs dtoverlay=uart0-pi5; creates /dev/ttyAMA0
  - name: gps_rtk_rover
    node_type: gps_rtk
    present: true
    enabled: true
    extra_args: >-
      --network host --ipc host
      --device=/dev/ttyAMA0:/dev/ttyAMA0
    config: |
      mode: rover
      serial_port: /dev/ttyAMA0
      baud_rate: 115200
      topic: /client/gps/fix
      frame_id: gps_link
      rtcm_server_host: 192.168.1.33
      rtcm_server_port: 5016
  - name: haptic_controller
    node_type: haptic_controller
    present: true
    enabled: false
    extra_args: --network host --ipc host
    config: |
      mode: off
      gripper_joint_names:
        - joint_5
        - joint_6
      leader_state_topic: /filter/input_joint_updates
      follower_state_topic: /follower/joint_states
      leader_cmd_topic: /client/haptic_leader_commands
      leader_set_register_topic: /client/haptic_leader_set_register
      control_loop_hz: 100
      resistance_gains:
        max_stiffness: 0.0008
        load_deadband: 60.0
        max_step_per_cycle: 0.02
        activation_velocity_threshold: 0.01
        release_delay_s: 0.15
        load_release_ratio: 0.6
        activation_debounce_cycles: 2
      delay_safety_max_skew_s: 0.4
      watchdog_timeout_s: 0.5
  - name: gripper_uvc_camera
    node_type: uvc_camera
    present: true
    enabled: true
    extra_args: >-
      --network host
      --ipc host
      --device=/dev/video0:/dev/video0
    env:
      - UVC_DEVICE=/dev/video0
      - UVC_TOPIC=/camera_0/image_raw
  - name: rplidar_a1
    node_type: rplidar_a1
    present: true
    enabled: true
    extra_args: >-
      --network host
      --ipc host
      --device=/dev/ttyUSB0:/dev/ttyUSB0
  - name: realsense_d435i
    node_type: realsense_d435i
    present: true
    enabled: true
    extra_args: >-
      --network host
      --ipc host
      --privileged
  - name: lerobot_follower
    node_type: feetech_servos
    present: true
    enabled: true
    extra_args: >-
      --network host
      --ipc host
      --device=/dev/ttyACM0:/dev/ttyACM0
      --mount type=bind,src=/dev/serial/by-id,dst=/dev/serial/by-id,readonly
    config: |
      device: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5A7A059004-if00
      namespace: follower
      log_joint_updates: true
      enable_torque_on_start: true
      register_publish_interval_s: 10
      publish_effort_joints:
        - joint_5
        - joint_6
      joint_names:
        - name: joint_1
          id: 1
        - name: joint_2
          id: 2
        - name: joint_3
          id: 3
        - name: joint_4
          id: 4
        - name: joint_5
          id: 5
        - name: joint_6
          id: 6
          source_min_steps: 2045
          source_max_steps: 3289
          command_min_steps: 1900
