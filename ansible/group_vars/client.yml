---
# Client — Raspberry Pi 5: follower, swerve, sensors, master2master
# Network (netplan) and hostname — set for each host or here for the group:
network_address: "192.168.1.34/24"
rpi_i2c_baudrate: 10000
network_gateway: "192.168.1.1"
primary_dns_server: "192.168.1.1"
secondary_dns_server: "1.1.1.1"
network_nameservers:
  - "{{ primary_dns_server }}"
  - "{{ secondary_dns_server }}"
hostname: "client-rpi5"

# Server hostname for master2master, rtcm, and ROS2 DDS (resolved via /etc/hosts).
ros2_server_host: "{{ ros2_server_hostname }}"

# ROS2 node types. Most client nodes stay localhost-only; master2master must reach server ROS graph.
ros2_node_type_defaults:
  ros2_master:
    deploy_mode: native
    node_launch_command: "ros2 daemon start && sleep infinity"
    node_src_dir: ""
    cpu_quota: "20%"
    memory_max: "128M"
    env:
      - ROS_LOCALHOST_ONLY=1
  master2master:
    deploy_mode: native
    node_launch_command: "python3 -m master2master"
    node_src_dir: "nodes/master2master"
    cpu_quota: "25%"
    memory_max: "128M"
    config_path: /etc/ros2/master2master
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - ROS_STATIC_PEERS=192.168.1.33
      - MASTER2MASTER_CONFIG=/etc/ros2/master2master/config.yaml
      # ROS2_SERVER_HOST passed per-node below so master2master can connect to Server's ROS2 master
  feetech_servos:
    deploy_mode: native
    node_launch_command: "python3 -m feetech_servos"
    node_src_dir: "nodes/bridges/feetech_servos"
    pythonpath_parent: true
    cpu_quota: "50%"
    memory_max: "128M"
    config_path: /etc/ros2/feetech_servos
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - FEETECH_SERVOS_CONFIG=/etc/ros2/feetech_servos/config.yaml
  uvc_camera:
    deploy_mode: native
    node_launch_command: "python3 -m uvc_camera"
    node_src_dir: "nodes/bridges/uvc_camera"
    pythonpath_parent: true
    cpu_quota: "30%"
    memory_max: "256M"
    env:
      - ROS_LOCALHOST_ONLY=1
  filter_node:
    deploy_mode: native
    node_launch_command: "python3 -m filter_node"
    node_src_dir: "nodes/filter_node"
    cpu_quota: "25%"
    memory_max: "128M"
    config_path: /etc/ros2/filter_node
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - FILTER_NODE_CONFIG=/etc/ros2/filter_node/config.yaml
  test_joint_api:
    deploy_mode: native
    node_launch_command: "python3 -m test_joint_api"
    node_src_dir: "nodes/test_joint_api"
    cpu_quota: "15%"
    memory_max: "64M"
    config_path: /etc/ros2/test_joint_api
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - TEST_JOINT_API_CONFIG=/etc/ros2/test_joint_api/config.yaml
  topic_scraper_api:
    deploy_mode: native
    node_launch_command: "python3 -m topic_scraper_api"
    node_src_dir: "nodes/topic_scraper_api"
    cpu_quota: "25%"
    memory_max: "128M"
    config_path: /etc/ros2/topic_scraper_api
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - TOPIC_SCRAPER_API_CONFIG=/etc/ros2/topic_scraper_api/config.yaml
  bno055_imu:
    deploy_mode: native
    node_launch_command: "python3 -m bno055_imu"
    node_src_dir: "nodes/bridges/bno055_imu"
    cpu_quota: "15%"
    memory_max: "64M"
    config_path: /etc/ros2/bno055_imu
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - BLINKA_FORCECHIP=BCM2XXX
      - BNO055_IMU_CONFIG=/etc/ros2/bno055_imu/config.yaml
  haptic_controller:
    deploy_mode: native
    node_launch_command: "python3 -m haptic_controller"
    node_src_dir: "nodes/haptic_controller"
    cpu_quota: "25%"
    memory_max: "64M"
    config_path: /etc/ros2/haptic_controller
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - HAPTIC_CONTROLLER_CONFIG=/etc/ros2/haptic_controller/config.yaml
  gps_rtk:
    deploy_mode: native
    node_launch_command: "python3 -m gps_rtk"
    node_src_dir: "nodes/bridges/gps_rtk"
    cpu_quota: "25%"
    memory_max: "64M"
    config_path: /etc/ros2/gps_rtk
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - GPS_RTK_CONFIG=/etc/ros2/gps_rtk/config.yaml
  rplidar_a1:
    deploy_mode: native
    node_launch_command: "ros2 launch {{ ros2_repo_dest }}/nodes/bridges/rplidar_a1/launch/rplidar_a1.launch.py"
    node_src_dir: ""
    cpu_quota: "30%"
    memory_max: "128M"
    apt_packages:
      - ros-jazzy-rplidar-ros
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
  realsense_d435i:
    deploy_mode: native
    node_launch_command: "ros2 launch realsense2_camera rs_launch.py enable_accel:=false enable_gyro:=false depth_module.depth_profile:=848x480x90 rgb_camera.color_profile:=1280x720x30"
    node_src_dir: ""
    cpu_quota: "200%"
    memory_max: "512M"
    apt_packages:
      - ros-jazzy-realsense2-camera
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
  swerve_controller:
    deploy_mode: native
    node_launch_command: "python3 -m swerve_drive_controller"
    node_src_dir: "nodes/swerve_drive_controller"
    cpu_quota: "30%"
    memory_max: "128M"
    config_path: /etc/ros2/swerve_drive_controller
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - SWERVE_DRIVE_CONTROLLER_CONFIG=/etc/ros2/swerve_drive_controller/config.yaml
  static_tf_publisher:
    deploy_mode: native
    node_launch_command: "python3 -m static_tf_publisher"
    node_src_dir: "nodes/static_tf_publisher"
    cpu_quota: "10%"
    memory_max: "64M"
    config_path: /etc/ros2/static_tf_publisher
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - STATIC_TF_PUBLISHER_CONFIG=/etc/ros2/static_tf_publisher/config.yaml
  robot_localization_ekf:
    deploy_mode: native
    node_launch_command: "ros2 launch robot_localization ekf.launch.py"
    node_src_dir: ""
    cpu_quota: "25%"
    memory_max: "128M"
    apt_packages:
      - ros-jazzy-robot-localization
    config_path: /etc/ros2/robot_localization_ekf
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - ROBOT_LOCALIZATION_EKF_CONFIG=/etc/ros2/robot_localization_ekf/config.yaml
  nav2_bringup:
    deploy_mode: native
    node_launch_command: "ros2 launch nav2_bringup bringup_launch.py use_localization:=False"
    node_src_dir: ""
    cpu_quota: "75%"
    memory_max: "512M"
    apt_packages:
      - ros-jazzy-nav2-bringup
      - ros-jazzy-nav2-core
      - ros-jazzy-nav2-costmap-2d
      - ros-jazzy-nav2-map-server
      - ros-jazzy-nav2-planner
      - ros-jazzy-nav2-controller
      - ros-jazzy-nav2-behaviors
      - ros-jazzy-nav2-bt-navigator
      - ros-jazzy-nav2-waypoint-follower
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
  web_ui:
    deploy_mode: native
    node_launch_command: "python3 -m web_ui"
    node_src_dir: "nodes/web_ui"
    cpu_quota: "30%"
    memory_max: "256M"
    config_path: /etc/ros2/web_ui
    env:
      - ROS_AUTOMATIC_DISCOVERY_RANGE=LOCALHOST
      - WEB_UI_CONFIG=/etc/ros2/web_ui/config.yaml

# Nodes to deploy: name (logical/service name), node_type (maps to image/config), present, enabled, config.
ros2_nodes:
  - name: ros2-master
    node_type: ros2_master
    present: true
    enabled: true
  - name: master2master
    node_type: master2master
    present: true
    enabled: true
    config: |
      topics:
        - source: /server/cmd_vel
          dest: /client/cmd_vel
          direction: in
        - source: /client/odom
          dest: /server/odom
          direction: out
        - source: /leader/joint_states
          dest: /filter/input_joint_updates
          direction: in
          type: JointState
        - source: /client/haptic_leader_commands
          dest: /leader/joint_commands
          direction: out
          type: JointState
        - source: /client/haptic_leader_set_register
          dest: /leader/set_register
          direction: out
          type: String
        # Controller-bound: relay client topics to /controller/* namespace (SteamDeck UI)
        - source: /imu/data
          dest: /controller/imu/data
          direction: out
          type: Imu
        - source: /follower/joint_states
          dest: /controller/follower/joint_states
          direction: out
          type: JointState
        - source: /swerve_drive/joint_states
          dest: /controller/swerve_drive/joint_states
          direction: out
          type: JointState
        - source: /client/gps/fix
          dest: /controller/gps/fix
          direction: out
          type: NavSatFix
        - source: /odom
          dest: /controller/odom
          direction: out
          type: Odometry
        - source: /camera_0/image_raw/compressed
          dest: /controller/camera_0/image_compressed
          direction: out
          type: CompressedImage
        # Controller-originated: relay SteamDeck commands into client ROS2 graph
        - source: /controller/goal_pose
          dest: /goal_pose
          direction: in
          type: PoseStamped
  - name: filter_node
    node_type: filter_node
    present: true
    enabled: true
    config: |
      input_topic: /filter/input_joint_updates
      output_topic: /follower/joint_commands
      algorithm: kalman
      control_loop_hz: 100
      idle_timeout_s: 0.5
      web_ui_input_topic: /filter/web_ui_joint_commands
      web_ui_timeout_s: 0.5
      follower_feedback_topic: /follower/joint_states
      takeover_threshold_rad: 0.15
      joint_names:
        - shoulder_pan
        - shoulder_lift
        - elbow_flex
        - wrist_flex
        - wrist_roll
        - gripper
      algorithm_params:
        process_noise_pos: 0.000518
        process_noise_vel: 0.03294
        measurement_noise: 7.06e-5
        prediction_lead_s: 0.045
        velocity_decay_per_s: 4.5
        max_prediction_time_s: 0.14
  - name: test_joint_api
    node_type: test_joint_api
    present: true
    enabled: true
    config: |
      host: "0.0.0.0"
      port: 18080
      topic: /filter/input_joint_updates
  - name: topic_scraper_api
    node_type: topic_scraper_api
    present: true
    enabled: true
    config: |
      host: "0.0.0.0"
      port: 18100
      topic_refresh_interval_s: 0.25
      allowed_types:
        - sensor_msgs/msg/JointState
        - sensor_msgs/msg/NavSatFix
        - sensor_msgs/msg/Image
        - sensor_msgs/msg/CompressedImage
        - sensor_msgs/msg/LaserScan
        - sensor_msgs/msg/PointCloud2
        - sensor_msgs/msg/Imu
        - std_msgs/msg/String
      observation_rules:
        - name: leader_vs_follower
          topics:
            - /filter/input_joint_updates
            - /follower/joint_states
          type: compare
          joint_names:
            - wrist_roll
            - gripper
        - name: leader_follower_oscillation
          topics:
            - /filter/input_joint_updates
            - /follower/joint_states
          type: oscillation
          joint_names:
            - wrist_roll
            - gripper
          window_s: 1.0
          variance_threshold: 1e-5
          sign_change_min_hz: 2.0
  - name: bno055_imu
    node_type: bno055_imu
    # 50 Hz reduces I2C load; BNO055 can return None on transient read failures
    present: true
    enabled: true
    config: |
      topic: /imu/data
      frame_id: imu_link
      publish_hz: 50
      i2c_bus: 1
      i2c_address: 0x28
      orientation_covariance: 0.01
      angular_velocity_covariance: 0.01
      linear_acceleration_covariance: 0.04
      compute_covariance: true
      covariance_window: 100      # rolling window size (samples, ~2 s at 50 Hz)
      covariance_min_samples: 20  # samples before estimated covariance replaces config values
  # RPi 5: GPIO UART0 (pins 14/15) needs dtoverlay=uart0-pi5; creates /dev/ttyAMA0
  - name: gps_rtk_rover
    node_type: gps_rtk
    present: true
    enabled: true
    env:
      - GPS_RTK_CONFIG=/etc/ros2/gps_rtk_rover/config.yaml
    config: |
      mode: rover
      serial_port: /dev/ttyAMA0
      baud_rate: 115200
      topic: /client/gps/fix
      frame_id: gps_link
      rtcm_server_host: {{ ros2_server_hostname }}
      rtcm_server_port: 5016
      ntrip_mountpoint: /rtk
      ntrip_user: ""
      ntrip_password: ""
      ntrip_gga_interval_s: 10.0
  - name: haptic_controller
    node_type: haptic_controller
    present: true
    enabled: false
    config: |
      mode: off
      gripper_joint_names:
        - joint_5
        - joint_6
      leader_state_topic: /filter/input_joint_updates
      follower_state_topic: /follower/joint_states
      leader_cmd_topic: /client/haptic_leader_commands
      leader_set_register_topic: /client/haptic_leader_set_register
      control_loop_hz: 100
      resistance_gains:
        max_stiffness: 0.0008
        load_deadband: 60.0
        max_step_per_cycle: 0.02
        activation_velocity_threshold: 0.01
        release_delay_s: 0.15
        load_release_ratio: 0.6
        activation_debounce_cycles: 2
      delay_safety_max_skew_s: 0.4
      watchdog_timeout_s: 0.5
  - name: gripper_uvc_camera
    node_type: uvc_camera
    present: true
    enabled: true
    env:
      - UVC_DEVICE=/dev/video0
      - UVC_TOPIC=/camera_0/image_raw
  - name: rplidar_a1
    node_type: rplidar_a1
    present: true
    enabled: true
  - name: realsense_d435i
    node_type: realsense_d435i
    present: true
    enabled: true
  - name: lerobot_follower
    node_type: feetech_servos
    present: true
    enabled: true
    env:
      - FEETECH_SERVOS_CONFIG=/etc/ros2/lerobot_follower/config.yaml
    config: |
      device: /dev/serial/by-id/usb-1a86_USB_Single_Serial_5A7A059004-if00
      namespace: follower
      log_joint_updates: true
      enable_torque_on_start: true
      register_publish_interval_s: 10
      publish_effort_joints:
        - wrist_roll
        - gripper
      joint_names:
        - name: shoulder_pan
          id: 1
        - name: shoulder_lift
          id: 2
        - name: elbow_flex
          id: 3
        - name: wrist_flex
          id: 4
        - name: wrist_roll
          id: 5
        - name: gripper
          id: 6
          source_min_steps: 2045
          source_max_steps: 3289
          command_min_steps: 1900
  - name: swerve_drive_servos
    node_type: feetech_servos
    present: true
    enabled: true
    env:
      - FEETECH_SERVOS_CONFIG=/etc/ros2/swerve_drive_servos/config.yaml
    config: |
      device: /dev/ttyUSB1
      namespace: swerve_drive
      log_joint_updates: false
      enable_torque_on_start: true
      register_publish_interval_s: 10
      joint_names:
        - name: fl_drive
          id: 1
        - name: fl_steer
          id: 2
        - name: fr_drive
          id: 3
        - name: fr_steer
          id: 4
        - name: rl_drive
          id: 5
        - name: rl_steer
          id: 6
        - name: rr_drive
          id: 7
        - name: rr_steer
          id: 8
  - name: swerve_controller
    node_type: swerve_controller
    present: true
    enabled: true
    env:
      - SWERVE_DRIVE_CONTROLLER_CONFIG=/etc/ros2/swerve_controller/config.yaml
    config: |
      half_length_m: 0.2
      half_width_m: 0.15
      wheel_radius_m: 0.15
      cmd_vel_topic: /cmd_vel
      joint_states_topic: /swerve_drive/joint_states
      joint_commands_topic: /swerve_drive/joint_commands
      odom_topic: /odom
      odom_frame_id: odom
      base_frame_id: base_link
      control_loop_hz: 50
      steer_error_threshold_rad: 0.35
      joint_names:
        - fl_drive
        - fl_steer
        - fr_drive
        - fr_steer
        - rl_drive
        - rl_steer
        - rr_drive
        - rr_steer
  - name: static_tf_publisher
    node_type: static_tf_publisher
    present: true
    enabled: true
    config: |
      # NOTE: These are estimates - update with actual measured offsets
      parent_frame: base_link
      frames:
        - child: imu_link
          x: 0.0
          y: 0.0
          z: 0.05
          roll: 0.0
          pitch: 0.0
          yaw: 0.0
        - child: laser_frame
          x: 0.10
          y: 0.0
          z: 0.12
          roll: 0.0
          pitch: 0.0
          yaw: 0.0
        - child: camera_link
          x: 0.10
          y: 0.0
          z: 0.08
          roll: 0.0
          pitch: 0.0
          yaw: 0.0
  - name: robot_localization_ekf
    node_type: robot_localization_ekf
    present: true
    enabled: true
    config: |
      ekf_filter_node:
        ros__parameters:
          frequency: 50.0
          sensor_timeout: 0.1
          two_d_mode: true
          publish_tf: true
          map_frame: map
          odom_frame: odom
          base_link_frame: base_link
          world_frame: odom
          odom0: /odom
          odom0_config: [true, true, false, false, false, false, true, true, false, false, false, true, false, false, false]
          odom0_queue_size: 10
          imu0: /imu/data
          imu0_config: [false, false, false, true, true, true, false, false, false, true, true, true, true, true, true]
          imu0_differential: false
          imu0_relative: true
          imu0_queue_size: 10
          imu0_remove_gravitational_acceleration: true
          use_control: false
  - name: nav2_bringup
    node_type: nav2_bringup
    present: true
    enabled: true
  - name: web_ui
    node_type: web_ui
    present: true
    enabled: true
    config: |
      http_port: 8080
      ws_broadcast_hz: 20
      bridge:
        host: localhost
        port: 9090
        ros_static_peers: "client.ros2.lan"
      tabs:
        - id: rgbd_camera
          type: rgbd_camera
          label: "RGBD Cam"
          color_topic: /camera/camera/color/image_raw
          depth_topic: /camera/camera/depth/image_rect_raw
          camera_info_topic: /camera/camera/depth/camera_info
        - id: imu_graphs
          type: imu_orientation
          label: "IMU"
          topics:
            - topic: /controller/imu/data
              fields: []
        - id: arm_servos
          type: effector_graph
          label: "Arm Servos"
          topics:
            - topic: /controller/follower/joint_states
              fields:
                - path: "position[0]"
                  label: "J1 shoulder_pan"
                  color: "#e06c75"
                - path: "position[1]"
                  label: "J2 shoulder_lift"
                  color: "#e5c07b"
                - path: "position[2]"
                  label: "J3 elbow_flex"
                  color: "#98c379"
                - path: "position[3]"
                  label: "J4 wrist_flex"
                  color: "#56b6c2"
                - path: "position[4]"
                  label: "J5 wrist_roll"
                  color: "#61afef"
                - path: "position[5]"
                  label: "J6 gripper"
                  color: "#c678dd"
          window_s: 10
        - id: local_nav
          type: nav_local
          label: "Local Map"
          scan_topic: /controller/scan
          costmap_topic: /controller/local_costmap
          odom_topic: /controller/odom
          goal_topic: /controller/goal_pose
        - id: gps_nav
          type: nav_gps
          label: "GPS Map"
          fix_topic: /controller/gps/fix
          goal_topic: /controller/goal_pose
          tile_url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
          default_zoom: 18
        - id: scene3d
          type: scene3d
          label: "3D Scene"
          urdf_file: robot.urdf
          topic: /controller/swerve_drive/joint_states
          arm_urdf_file: so101_arm.urdf
          arm_joint_topic: /controller/follower/joint_states
          scan_topic: /controller/scan
          costmap_topic: /controller/local_costmap
          odom_topic: /controller/odom
        - id: robot_status
          type: robot_status
          label: "Robot Status"
          urdf_file: robot.urdf
          topic: /controller/swerve_drive/joint_states
          arm_urdf_file: so101_arm.urdf
          arm_joint_topic: /controller/follower/joint_states
          arm_command_topic: /filter/web_ui_joint_commands
      overlays:
        - topic: /controller/gps/fix
          field: "latitude"
          label: "Lat"
          format: ".6f"
        - topic: /controller/gps/fix
          field: "longitude"
          label: "Lon"
          format: ".6f"
        - topic: /controller/odom
          field: "twist.twist.linear.x"
          label: "Vel"
          format: ".2f"
          unit: "m/s"
        - topic: /controller/swerve_drive/joint_states
          field: "position[1]"
          label: "FL Steer"
          format: ".2f"
          unit: "rad"
