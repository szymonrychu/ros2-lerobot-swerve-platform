http_port: 8080
ws_broadcast_hz: 20

bridge:
  host: localhost
  port: 9090
  ros_static_peers: "client.ros2.lan"

tabs:
  - id: gripper_camera
    type: camera
    label: "Gripper Cam"
    topic: /controller/camera_0/image_raw

  - id: imu_graphs
    type: imu_orientation
    label: "IMU"
    topics:
      - topic: /controller/imu/data
        fields: []

  - id: arm_servos
    type: effector_graph
    label: "Arm Servos"
    topics:
      - topic: /controller/follower/joint_states
        fields:
          - path: "position[0]"
            label: "J1 shoulder_pan"
            color: "#e06c75"
          - path: "position[1]"
            label: "J2 shoulder_lift"
            color: "#e5c07b"
          - path: "position[2]"
            label: "J3 elbow_flex"
            color: "#98c379"
          - path: "position[3]"
            label: "J4 wrist_flex"
            color: "#56b6c2"
          - path: "position[4]"
            label: "J5 wrist_roll"
            color: "#61afef"
          - path: "position[5]"
            label: "J6 gripper"
            color: "#c678dd"
    window_s: 10

  - id: local_nav
    type: nav_local
    label: "Local Map"
    scan_topic: /controller/scan
    costmap_topic: /controller/local_costmap
    odom_topic: /controller/odom
    goal_topic: /controller/goal_pose

  - id: gps_nav
    type: nav_gps
    label: "GPS Map"
    fix_topic: /controller/gps/fix
    goal_topic: /controller/goal_pose
    tile_url: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png"
    default_zoom: 18

  - id: scene3d
    type: scene3d
    label: "3D Scene"
    urdf_file: robot.urdf
    topic: /controller/swerve_drive/joint_states
    arm_urdf_file: so101_arm.urdf
    arm_joint_topic: /controller/follower/joint_states
    scan_topic: /controller/scan
    costmap_topic: /controller/local_costmap
    odom_topic: /controller/odom

  - id: robot_status
    type: robot_status
    label: "Robot Status"
    urdf_file: robot.urdf
    topic: /controller/swerve_drive/joint_states
    arm_urdf_file: so101_arm.urdf
    arm_joint_topic: /controller/follower/joint_states
    arm_command_topic: /controller/follower/joint_commands

overlays:
  - topic: /controller/gps/fix
    field: "latitude"
    label: "Lat"
    format: ".6f"
  - topic: /controller/gps/fix
    field: "longitude"
    label: "Lon"
    format: ".6f"
  - topic: /controller/odom
    field: "twist.twist.linear.x"
    label: "Vel"
    format: ".2f"
    unit: "m/s"
  - topic: /controller/swerve_drive/joint_states
    field: "position[1]"
    label: "FL Steer"
    format: ".2f"
    unit: "rad"
